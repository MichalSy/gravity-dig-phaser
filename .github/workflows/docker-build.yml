name: Build and Push Docker Image

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gravity-dig-phaser.aikogame
  BASE_VERSION: 1.0

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine next version
        id: version
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAGS=$(curl -s -H "Authorization: Bearer $GHCR_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/users/michalsy/packages/container/gravity-dig-phaser.aikogame/versions" | \
            jq -r '.[].metadata.container.tags[]' 2>/dev/null | grep -E "^${BASE_VERSION}\.[0-9]+$" || true)
          LAST_PATCH=$(echo "$TAGS" | sed "s/^${BASE_VERSION}\.//" | sort -n | tail -1)
          if [ -z "$LAST_PATCH" ]; then PATCH=0; else PATCH=$((LAST_PATCH + 1)); fi
          VERSION="${BASE_VERSION}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "full_image=${REGISTRY}/michalsy/${IMAGE_NAME}:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_image=${REGISTRY}/michalsy/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.version.outputs.full_image }}
            ${{ steps.version.outputs.latest_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
